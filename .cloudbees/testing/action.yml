apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: 'Configure ECR Credentials For CloudBees Automations'
description: 'Configure ECR credentials for use with tools that interact with OCI registries'
inputs:
  registries:
    description: >-
      A comma-delimited list of ECR Private registry hostnames (for example,
      '123456789012.dkr.ecr.us-east-1.amazonaws.com') to configure credentials for.
      Each entry must be a fully-qualified registry hostname including the AWS account ID and region.
      If you do not specify a registry, the default ECR Private registry for the caller's account and the
      region(s) given via 'regions' (or the current region) is assumed.
      When 'registries' is set, the 'regions' input is ignored (regions are part of each hostname).
      If 'public' is given as input to 'registry-type', this input is ignored.
    required: false
  registry-type:
    description: >-
      Which ECR registry type to log into.
      Options: [private, public]
    required: false
    default: private
  regions:
    description: >-
      When the registries have not been specified, a comma-delimited list fo the regions to configure the default ECR 
      Private registry for. If empty the only the current region will be configured.
runs:
  using: composite
  steps:
    - name: Configure ECR Credentials For CloudBees Automations
      uses: docker://020229604682.dkr.ecr.us-east-1.amazonaws.com/actions/configure-ecr-credentials:${{ file.scm.sha }}
      env:
        INPUT_REGISTRIES: ${{ inputs.registries }}
        INPUT_REGISTRY_TYPE: ${{ inputs.registry-type }}
        INPUT_REGIONS: ${{ inputs.regions }}
      with:
        entrypoint: configure-ecr-credentials
        args: "" # SDP-6025
